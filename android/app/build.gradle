plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def secretProperties = new Properties()
secretProperties.setProperty("signing_keystore_password", "${System.getenv('FLAUNCHER_KEYSTORE_PASSWORD')}")
secretProperties.setProperty("signing_key_password", "${System.getenv('FLAUNCHER_SIGNING_KEY_PASSWORD')}")
secretProperties.setProperty("signing_key_alias", "${System.getenv('FLAUNCHER_SIGNING_KEY_ALIAS')}")

def hasReleaseSigningCredentials =
        secretProperties['signing_keystore_password'] &&
        secretProperties['signing_keystore_password'] != 'null' &&
        secretProperties['signing_key_password'] &&
        secretProperties['signing_key_password'] != 'null' &&
        secretProperties['signing_key_alias'] &&
        secretProperties['signing_key_alias'] != 'null'

def configuredReleaseAbis = []
def flutterTargetPlatforms = project.findProperty('target-platform')
        ?.toString()
        ?.split(',')
        ?.collect { it.trim() }
        ?.findAll { !it.isEmpty() }

if (flutterTargetPlatforms?.contains('android-arm64')) {
    configuredReleaseAbis << 'arm64-v8a'
}
if (flutterTargetPlatforms?.contains('android-arm')) {
    configuredReleaseAbis << 'armeabi-v7a'
}
if (flutterTargetPlatforms?.contains('android-x64')) {
    configuredReleaseAbis << 'x86_64'
}
if (configuredReleaseAbis.isEmpty()) {
    configuredReleaseAbis << (project.findProperty('releaseAbi') ?: 'armeabi-v7a')
}
def buildUniversalReleaseApk =
        configuredReleaseAbis.size() > 1 ||
        (project.findProperty('releaseUniversalApk') ?: 'false')
                .toString()
                .toBoolean()

android {
    namespace 'com.atv.launcher'
    compileSdk 35

    defaultConfig {
        applicationId "com.atv.launcher"
        minSdk 28
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        debug {}
        release {
            storeFile file("upload-keystore.jks")
            storePassword "${secretProperties['signing_keystore_password']}"
            keyAlias "${secretProperties['signing_key_alias']}"
            keyPassword "${secretProperties['signing_key_password']}"
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig hasReleaseSigningCredentials
                    ? signingConfigs.release
                    : signingConfigs.debug
        }
    }

    splits {
        abi {
            // https://stackoverflow.com/a/39950584/21037183
            enable gradle.startParameter.taskNames.any { it.contains("assembleRelease") }
            reset()
            include(*configuredReleaseAbis)
            universalApk buildUniversalReleaseApk
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "androidx.media3:media3-exoplayer:1.5.1"
    implementation "androidx.media3:media3-ui:1.5.1"
}
