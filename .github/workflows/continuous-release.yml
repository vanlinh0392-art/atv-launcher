name: Continuous Official Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Publish Official APK Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub

      - name: Build release APK
        id: build_release
        shell: bash
        run: |
          set -euo pipefail
          rm -f build/app/outputs/flutter-apk/*release*.apk || true
          rm -f build/app/outputs/apk/release/*release*.apk || true
          set +e
          flutter build apk --release --target-platform android-arm --no-pub
          status=$?
          set -e
          apk_path="$(find build/app/outputs/flutter-apk -maxdepth 1 -name '*release*.apk' | head -n 1)"
          if [[ ${status} -ne 0 && -z "${apk_path}" ]]; then
            echo "Release APK was not produced."
            exit "${status}"
          fi

      - name: Prepare official release asset
        id: prepare_release_asset
        shell: bash
        run: |
          set -euo pipefail
          apk_path="$(find build/app/outputs/flutter-apk -maxdepth 1 -name '*release*.apk' | head -n 1)"
          if [[ -z "${apk_path}" ]]; then
            echo "Release APK was not produced."
            exit 1
          fi
          asset_path="build/app/outputs/flutter-apk/atv-launcher-armeabi-v7a-release.apk"
          cp "${apk_path}" "${asset_path}"
          echo "asset_path=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Compute official release metadata
        id: official_release_meta
        shell: bash
        run: |
          set -euo pipefail
          raw_version="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | head -n 1)"
          if [[ -z "${raw_version}" ]]; then
            echo "Unable to read version from pubspec.yaml"
            exit 1
          fi
          version_name="${raw_version%%+*}"
          tag_name="v${version_name}-release"
          echo "version_name=${version_name}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "release_name=ATV Launcher xfire0392-netizen v${version_name}" >> "${GITHUB_OUTPUT}"

      - name: Build release notes from changelog
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          lines = changelog.splitlines()
          current_section = []
          capture = False

          for line in lines:
              if line.startswith("## "):
                  if capture:
                      break
                  capture = True
              if capture:
                  current_section.append(line)

          if not current_section:
              raise SystemExit("Could not extract latest changelog section.")

          footer = [
              "",
              "Tep phat hanh: `atv-launcher-armeabi-v7a-release.apk`",
              "",
              "Updater-Channel: `xfire0392-netizen-official`",
              "Launcher updater chi nhan official release va bo qua debug build.",
          ]
          Path("build/release_notes.md").write_text(
              "\n".join(current_section + footer).strip() + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload official APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: atv-launcher-armeabi-v7a-release
          path: ${{ steps.prepare_release_asset.outputs.asset_path }}
          retention-days: 30

      - name: Publish official GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.official_release_meta.outputs.tag_name }}
          name: ${{ steps.official_release_meta.outputs.release_name }}
          body_path: build/release_notes.md
          files: ${{ steps.prepare_release_asset.outputs.asset_path }}
