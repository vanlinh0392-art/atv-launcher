name: Continuous Releases

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-releases:
    name: Build and Publish APK Releases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm --no-pub

      - name: Prepare release asset
        id: prepare_asset
        shell: bash
        run: |
          set -euo pipefail
          apk_path="$(find build/app/outputs/flutter-apk -maxdepth 1 -name '*debug*.apk' | head -n 1)"
          if [[ -z "${apk_path}" ]]; then
            echo "Debug APK was not produced."
            exit 1
          fi
          asset_path="build/app/outputs/flutter-apk/atv-launcher-armeabi-v7a-debug.apk"
          cp "${apk_path}" "${asset_path}"
          echo "asset_path=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Compute release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          tag_name="v$(date +'%Y.%m').${GITHUB_RUN_NUMBER}-debug"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "release_name=ATV Launcher Debug ${tag_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: atv-launcher-armeabi-v7a-debug
          path: ${{ steps.prepare_asset.outputs.asset_path }}
          retention-days: 30

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          body: |
            Debug APK build generated automatically from `main`.

            File: `atv-launcher-armeabi-v7a-debug.apk`

            This is a debug build intended for device testing and provisioning workflows.
            See `README.md` in the repository for TV installation, ADB grant and update steps.
          files: ${{ steps.prepare_asset.outputs.asset_path }}

      - name: Build release APK
        id: build_release
        shell: bash
        run: |
          set -euo pipefail
          rm -f build/app/outputs/flutter-apk/*release*.apk || true
          rm -f build/app/outputs/apk/release/*release*.apk || true
          set +e
          flutter build apk --release --target-platform android-arm --no-pub
          status=$?
          set -e
          apk_path="$(find build/app/outputs/flutter-apk -maxdepth 1 -name '*release*.apk' | head -n 1)"
          if [[ ${status} -ne 0 && -z "${apk_path}" ]]; then
            echo "Release APK was not produced."
            exit "${status}"
          fi

      - name: Prepare official release asset
        id: prepare_release_asset
        shell: bash
        run: |
          set -euo pipefail
          apk_path="$(find build/app/outputs/flutter-apk -maxdepth 1 -name '*release*.apk' | head -n 1)"
          if [[ -z "${apk_path}" ]]; then
            echo "Release APK was not produced."
            exit 1
          fi
          asset_path="build/app/outputs/flutter-apk/atv-launcher-armeabi-v7a-release.apk"
          cp "${apk_path}" "${asset_path}"
          echo "asset_path=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Compute official release metadata
        id: official_release_meta
        shell: bash
        run: |
          set -euo pipefail
          raw_version="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | head -n 1)"
          if [[ -z "${raw_version}" ]]; then
            echo "Unable to read version from pubspec.yaml"
            exit 1
          fi
          version_name="${raw_version%%+*}"
          tag_name="v${version_name}-release"
          echo "version_name=${version_name}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "release_name=ATV Launcher Release v${version_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload official APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: atv-launcher-armeabi-v7a-release
          path: ${{ steps.prepare_release_asset.outputs.asset_path }}
          retention-days: 30

      - name: Publish official GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.official_release_meta.outputs.tag_name }}
          name: ${{ steps.official_release_meta.outputs.release_name }}
          body: |
            Official ATV Launcher release APK.

            File: `atv-launcher-armeabi-v7a-release.apk`

            This is the official release channel used by the in-app updater.
            Debug releases are published separately and ignored by the updater.
          files: ${{ steps.prepare_release_asset.outputs.asset_path }}
