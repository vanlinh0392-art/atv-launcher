name: Continuous Official Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  LAUNCHER_UPDATE_CHANNEL: atv-launcher-official

jobs:
  build-release:
    name: Build and Publish Official APK Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub

      - name: Build armeabi-v7a release APK
        id: build_release_v7a
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release-assets
          rm -f build/app/outputs/flutter-apk/*release*.apk || true
          rm -f build/app/outputs/apk/release/*release*.apk || true
          set +e
          flutter build apk --release --target-platform android-arm --no-pub \
            --dart-define=LAUNCHER_UPDATE_GITHUB_OWNER="${GITHUB_REPOSITORY_OWNER}" \
            --dart-define=LAUNCHER_UPDATE_GITHUB_REPO="${GITHUB_REPOSITORY#*/}" \
            --dart-define=LAUNCHER_UPDATE_CHANNEL="${LAUNCHER_UPDATE_CHANNEL}" \
            --dart-define=LAUNCHER_SOURCE_REPO_URL="https://github.com/${GITHUB_REPOSITORY}" \
            --dart-define=LAUNCHER_LEGALESE_OWNER="${GITHUB_REPOSITORY_OWNER}"
          status=$?
          set -e
          apk_path="$(find build/app/outputs/flutter-apk -maxdepth 1 -name '*armeabi-v7a*release*.apk' | head -n 1)"
          if [[ -z "${apk_path}" ]]; then
            apk_path="$(find build/app/outputs/flutter-apk -maxdepth 1 -name '*release*.apk' | head -n 1)"
          fi
          if [[ ${status} -ne 0 && -z "${apk_path}" ]]; then
            echo "armeabi-v7a release APK was not produced."
            exit "${status}"
          fi
          if [[ -z "${apk_path}" ]]; then
            echo "armeabi-v7a release APK was not produced."
            exit 1
          fi
          asset_path="build/release-assets/atv-launcher-armeabi-v7a-release.apk"
          cp "${apk_path}" "${asset_path}"
          echo "asset_path=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Verify armeabi-v7a release APK
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_release_apk.py \
            --apk "${{ steps.build_release_v7a.outputs.asset_path }}" \
            --expected-abi armeabi-v7a \
            --report build/release-assets/verify-armeabi-v7a.json

      - name: Build arm64-v8a release APK
        id: build_release_v8a
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release-assets
          rm -f build/app/outputs/flutter-apk/*release*.apk || true
          rm -f build/app/outputs/apk/release/*release*.apk || true
          set +e
          flutter build apk --release --target-platform android-arm64 --no-pub \
            --dart-define=LAUNCHER_UPDATE_GITHUB_OWNER="${GITHUB_REPOSITORY_OWNER}" \
            --dart-define=LAUNCHER_UPDATE_GITHUB_REPO="${GITHUB_REPOSITORY#*/}" \
            --dart-define=LAUNCHER_UPDATE_CHANNEL="${LAUNCHER_UPDATE_CHANNEL}" \
            --dart-define=LAUNCHER_SOURCE_REPO_URL="https://github.com/${GITHUB_REPOSITORY}" \
            --dart-define=LAUNCHER_LEGALESE_OWNER="${GITHUB_REPOSITORY_OWNER}"
          status=$?
          set -e
          apk_path="$(find build/app/outputs/flutter-apk -maxdepth 1 -name '*arm64-v8a*release*.apk' | head -n 1)"
          if [[ -z "${apk_path}" ]]; then
            apk_path="$(find build/app/outputs/flutter-apk -maxdepth 1 -name '*release*.apk' | head -n 1)"
          fi
          if [[ ${status} -ne 0 && -z "${apk_path}" ]]; then
            echo "arm64-v8a release APK was not produced."
            exit "${status}"
          fi
          if [[ -z "${apk_path}" ]]; then
            echo "arm64-v8a release APK was not produced."
            exit 1
          fi
          asset_path="build/release-assets/atv-launcher-arm64-v8a-release.apk"
          cp "${apk_path}" "${asset_path}"
          echo "asset_path=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Verify arm64-v8a release APK
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_release_apk.py \
            --apk "${{ steps.build_release_v8a.outputs.asset_path }}" \
            --expected-abi arm64-v8a \
            --report build/release-assets/verify-arm64-v8a.json

      - name: Verify official release asset set
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_release_apk.py \
            --scan-dir build/release-assets \
            --report build/release-assets/verify-official-assets.json

      - name: Compute official release metadata
        id: official_release_meta
        shell: bash
        run: |
          set -euo pipefail
          raw_version="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | head -n 1)"
          if [[ -z "${raw_version}" ]]; then
            echo "Unable to read version from pubspec.yaml"
            exit 1
          fi
          version_name="${raw_version%%+*}"
          tag_name="v${version_name}-release"
          echo "version_name=${version_name}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "release_name=ATV Launcher v${version_name}" >> "${GITHUB_OUTPUT}"

      - name: Build release notes from changelog
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          lines = changelog.splitlines()
          current_section = []
          capture = False

          for line in lines:
              if line.startswith("## "):
                  if capture:
                      break
                  capture = True
              if capture:
                  current_section.append(line)

          if not current_section:
              raise SystemExit("Could not extract latest changelog section.")

          footer = [
              "",
              "Tep phat hanh:",
              "- `atv-launcher-armeabi-v7a-release.apk`",
              "- `atv-launcher-arm64-v8a-release.apk`",
              "",
              "Updater-Channel: atv-launcher-official",
              "Launcher updater chi nhan official release va bo qua debug build.",
          ]
          Path("build/release_notes.md").write_text(
              "\n".join(current_section + footer).strip() + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload official APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atv-launcher-official-release-apks
          path: |
            ${{ steps.build_release_v7a.outputs.asset_path }}
            ${{ steps.build_release_v8a.outputs.asset_path }}
            build/release-assets/verify-armeabi-v7a.json
            build/release-assets/verify-arm64-v8a.json
            build/release-assets/verify-official-assets.json
          retention-days: 30

      - name: Publish official GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.official_release_meta.outputs.tag_name }}
          name: ${{ steps.official_release_meta.outputs.release_name }}
          body_path: build/release_notes.md
          files: |
            ${{ steps.build_release_v7a.outputs.asset_path }}
            ${{ steps.build_release_v8a.outputs.asset_path }}
